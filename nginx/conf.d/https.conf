# ── HTTPS server ──────────────────────────────────────────────────────────────
# This file is mounted at /etc/nginx/https.conf.template inside the container.
# The nginx entrypoint command copies it to /etc/nginx/conf.d/https.conf ONLY
# when the Let's Encrypt certificate already exists.
# If no cert → nginx starts HTTP-only. Run ssl-init.sh to get the cert,
# then restart nginx: docker-compose restart nginx
server {
    listen 443 ssl http2;
    server_name abhitrade.com www.abhitrade.com;

    # ── Certificates (managed by Certbot) ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/abhitrade.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abhitrade.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/abhitrade.com/chain.pem;

    # ── SSL hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN                                     always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # ── Connection limit per IP ───────────────────────────────────────────────
    limit_conn addr 50;

    # ── Next.js static assets — immutable, 1-year cache ──────────────────────
    location /_next/static/ {
        proxy_pass http://tradekaro_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── API routes — stricter rate limit ─────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass            http://tradekaro_app;
        proxy_http_version    1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # ── Everything else (pages, WebSocket) ───────────────────────────────────
    location / {
        limit_req zone=general burst=100 nodelay;
        proxy_pass            http://tradekaro_app;
        proxy_http_version    1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }
}
