# ── HTTP server ───────────────────────────────────────────────────────────────
# Always loaded. Serves two purposes:
#   1. Certbot ACME challenge (/.well-known/acme-challenge/)
#   2. Redirects all other traffic to HTTPS (after cert exists)
#      Falls back to proxying directly if HTTPS is not yet configured.
server {
    listen 80;
    server_name abhitrade.com www.abhitrade.com;

    # Certbot webroot challenge — must be reachable on port 80
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all HTTP → HTTPS on primary domain
    location / {
        return 301 https://abhitrade.com$request_uri;
    }
}

# ── abhitrade.online — ACME challenge + redirect to primary domain ────────────
# abhitrade.online still DNS-points to this server. This block lets certbot
# renew the .online cert via the webroot challenge, and redirects all traffic
# to abhitrade.com so users/bookmarks on the old domain still work.
server {
    listen 80;
    server_name abhitrade.online www.abhitrade.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://abhitrade.com$request_uri;
    }
}
