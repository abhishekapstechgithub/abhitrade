# ── Upstream: Next.js app on internal Docker network ─────────────────────────
upstream tradekaro_app {
    server app:3000;
    keepalive 32;
}

# ── HTTP server ───────────────────────────────────────────────────────────────
# Always loaded. Serves two purposes:
#   1. Certbot ACME challenge (/.well-known/acme-challenge/)
#   2. Redirects all other traffic to HTTPS (after cert exists)
#      Falls back to proxying directly if HTTPS is not yet configured.
server {
    listen 80;
    server_name abhitrade.online www.abhitrade.online;

    # Certbot webroot challenge — must be reachable on port 80
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Proxy directly to the app (HTTP-only mode before SSL cert exists).
    # Once ssl-init.sh runs and https.conf is loaded, replace this block with
    # a 301 redirect:  return 301 https://$host$request_uri;
    location / {
        proxy_pass         http://tradekaro_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
