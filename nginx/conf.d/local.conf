# ── Local development — HTTP only, no SSL, no redirect ────────────────────────
# Loaded only in local dev via docker-compose.override.yml.
# Upstream defined here because the override uses plain nginx (no custom entrypoint).
upstream tradekaro_app {
    server app:3000;
    keepalive 32;
}

server {
    listen      80 default_server;
    server_name localhost _;

    client_max_body_size 100M;
    client_body_timeout  60s;

    # Next.js hot-reload WebSocket (dev mode HMR)
    location /_next/webpack-hmr {
        proxy_pass         http://tradekaro_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    location / {
        proxy_pass            http://tradekaro_app;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        'upgrade';
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }
}
