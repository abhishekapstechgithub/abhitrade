# ── Local development — HTTP only, no SSL, no redirect ────────────────────────
server {
    listen      80 default_server;
    server_name localhost _;

    client_max_body_size 100M;
    client_body_timeout  60s;

    # Next.js hot-reload WebSocket (dev mode HMR)
    location /_next/webpack-hmr {
        proxy_pass         http://tradekaro_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # SSE streams — no buffering → Express backend
    location ~ ^/api/(market-stream|optionchain/stream) {
        proxy_pass            http://backend_api;
        proxy_http_version    1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header Connection         '';
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        chunked_transfer_encoding on;
    }

    # Strategy, Backtest, Paper Trading, Scrip, Options → FastAPI
    location ~ ^/api/(strategies|backtests|paper|scrip|options)(/|$) {
        proxy_pass            http://strategy_api;
        proxy_http_version    1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # Live price WebSocket stream → Express backend
    location /ws/stream {
        proxy_pass            http://backend_api;
        proxy_http_version    1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    # All other API routes → Express backend
    location /api/ {
        proxy_pass            http://backend_api;
        proxy_http_version    1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    location / {
        proxy_pass            http://tradekaro_app;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        'upgrade';
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_cache_bypass    $http_upgrade;
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }
}
