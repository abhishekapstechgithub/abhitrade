user  nginx;
worker_processes  auto;
# Allow each worker to open enough file descriptors for worker_connections
worker_rlimit_nofile  4096;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # Upload size (security master CSV files can be large)
    client_max_body_size 100M;
    client_body_timeout  60s;

    # Proxy buffers — tuned for Next.js SSR responses
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml font/woff2;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr  zone=general:20m  rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=api:20m      rate=30r/m;
    limit_conn_zone $binary_remote_addr  zone=addr:10m;

    include /etc/nginx/conf.d/*.conf;
}
