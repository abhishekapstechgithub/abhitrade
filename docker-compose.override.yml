version: '3.9'

# ────────────────────────────────────────────────────────────────────────────
#  TradeKaro — Development Override
#
#  Dev start:   docker-compose up -d
#  Prod start:  docker-compose -f docker-compose.yml up -d --build
#
#  Traffic:  http://localhost  →  nginx:80  →  app:3000 (next dev)
#  Port 3000 is NOT exposed directly — nginx is the only entry point.
#  Certbot is disabled; SSL is production-only.
# ────────────────────────────────────────────────────────────────────────────

services:

  # ── Next.js dev server ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: abhitrade-app-dev
    # Port 3000 is internal only — access via http://localhost through nginx
    expose:
      - '3000'
    volumes:
      # Single root mount — reliable on Docker Desktop + WSL2.
      # Individual per-directory mounts silently fail on Windows filesystem paths.
      - .:/app
      # Keep the container's node_modules (npm ci'd in the image)
      - /app/node_modules
      # Preserve Next.js compilation cache between restarts
      - nextjs_cache:/app/.next
      - uploads:/app/tmp/uploads
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB_LIVE=abhitrade_live
      - POSTGRES_DB_PAPER=abhitrade_papertrade
      - POSTGRES_USER=${POSTGRES_USER:-tradekaro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tradekaro}
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - JWT_SECRET=${JWT_SECRET:-abhitrade-dev-secret}
      - UPLOAD_DIR=/app/tmp/uploads
      - NEXT_TELEMETRY_DISABLED=1
      - ANGELONE_API_KEY=${ANGELONE_API_KEY:-}
      - ANGELONE_CLIENT_ID=${ANGELONE_CLIENT_ID:-}
      - ANGELONE_PASSWORD=${ANGELONE_PASSWORD:-}
      - ANGELONE_TOTP_SECRET=${ANGELONE_TOTP_SECRET:-}
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=${MONGODB_DB:-abhitrade}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 5s
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - abhitrade-net

  # ── Nginx — local HTTP-only reverse proxy ─────────────────────────────────
  nginx:
    # Add the local dev config; override command to skip the SSL cert check.
    # http.conf (from docker-compose.yml) is still mounted but its server block
    # only responds to abhitrade.online — requests to localhost hit local.conf.
    volumes:
      # Replace the default nginx image conf (also server_name localhost) with
      # our local proxy config to avoid "conflicting server name" warnings.
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf:ro
    command: nginx -g 'daemon off;'
    depends_on:
      - app

  # ── Certbot — disabled in local dev ───────────────────────────────────────
  certbot:
    entrypoint: /bin/sh -c 'echo "Certbot disabled in local dev — SSL is production-only" && exit 0'
    restart: 'no'

volumes:
  nextjs_cache:
    driver: local
