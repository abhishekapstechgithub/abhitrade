# ────────────────────────────────────────────────────────────────────────────
#  AbhiTrade — Development Override (monorepo)
#
#  Dev start:   docker-compose up -d
#  Prod start:  docker-compose -f docker-compose.yml up -d --build
#
#  Traffic:  http://localhost  →  nginx:80
#              /api/*  →  backend-api:3001  (Express)
#              /*      →  app:3000          (Next.js dev)
#
#  Port 3000 and 3001 are internal only — nginx is the only entry point.
# ────────────────────────────────────────────────────────────────────────────

services:

  # ── Next.js dev server ────────────────────────────────────────────────────
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: abhitrade-app-dev
    expose:
      - '3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - nextjs_cache:/app/.next
    environment:
      - NODE_ENV=development
      - BACKEND_API_URL=http://backend-api:3001
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 5s
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - proxy-net
      - app-net

  # ── Express backend — hot reload via tsx watch ────────────────────────────
  backend-api:
    command: ["node_modules/.bin/tsx", "watch", "server.ts"]
    volumes:
      - ./backend/api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  # ── Nginx — local HTTP-only reverse proxy ─────────────────────────────────
  nginx:
    volumes:
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf:ro
    command: nginx -g 'daemon off;'
    depends_on:
      - app
      - backend-api

  # ── Certbot — disabled in local dev ───────────────────────────────────────
  certbot:
    entrypoint: /bin/sh -c 'echo "Certbot disabled in local dev — SSL is production-only" && exit 0'
    restart: 'no'

volumes:
  nextjs_cache:
    driver: local
