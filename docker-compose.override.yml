version: '3.9'

# ────────────────────────────────────────────────────────────────────────────
#  TradeKaro — Development Override
#
#  Dev start:        docker-compose up -d
#  Prod-only start:  docker-compose -f docker-compose.yml up -d --build
#
#  Only web-relevant source directories are mounted into the app container.
#  scripts/, workers/, mobile_app/ stay out of the web container entirely.
# ────────────────────────────────────────────────────────────────────────────

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: abhitrade-app-dev
    ports:
      - '3000:3000'
    volumes:
      # Mount entire project root — single mount is reliable on Docker Desktop + WSL2.
      # Individual per-directory mounts silently fail on Windows filesystem paths.
      - .:/app
      # Keep the container's node_modules (npm ci'd in the image) — don't overwrite
      # with the host's node_modules (or lack thereof)
      - /app/node_modules
      # Preserve Next.js compilation cache between restarts (huge speed boost)
      - nextjs_cache:/app/.next
      - uploads:/app/tmp/uploads
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB_LIVE=abhitrade_live
      - POSTGRES_DB_PAPER=abhitrade_papertrade
      - POSTGRES_USER=${POSTGRES_USER:-tradekaro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tradekaro}
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - JWT_SECRET=${JWT_SECRET:-abhitrade-dev-secret}
      - UPLOAD_DIR=/app/tmp/uploads
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 5s
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - abhitrade-net

volumes:
  nextjs_cache:
    driver: local
