name: abhitrade
description: AbhiTrade - Trade Smart. Invest Better.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  shimmer: ^3.0.0
  webview_flutter: ^4.10.0
  google_fonts: ^6.2.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logo_legacy.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "logo_foreground.png"
