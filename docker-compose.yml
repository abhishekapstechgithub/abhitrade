# ────────────────────────────────────────────────────────────────────────────
#  TradeKaro — Production Docker Compose (Microservices Architecture)
#
#  First deploy (with SSL):
#    docker compose up -d --build          ← starts everything
#    bash scripts/ssl-init.sh              ← gets Let's Encrypt cert (run once)
#
#  Subsequent starts:
#    docker compose up -d --build
#
#  Reload CSV:   docker compose run --rm loader --force
#  Stop all:     docker compose down
#  Wipe volumes: docker compose down -v
#
#  Network topology:
#    Internet → Nginx (proxy-net, 80/443) → app:3000 (proxy-net + app-net)
#    app ↔ redis, postgres, market-sync  (app-net)
#    postgres ↔ redis  (db-net, internal-only)
# ────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: abhitrade-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-tradekaro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradekaro}
      POSTGRES_DB:       postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./lib/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
      - ./scripts/migrate-password-nullable.sql:/docker-entrypoint-initdb.d/migrate-password-nullable.sql:ro
      - ./scripts/migrate-market-movers.sql:/docker-entrypoint-initdb.d/migrate-market-movers.sql:ro
      - ./scripts/migrate-market-movers-v2.sql:/docker-entrypoint-initdb.d/migrate-market-movers-v2.sql:ro
      - ./scripts/migrate-bhavcopy-prices.sql:/docker-entrypoint-initdb.d/migrate-bhavcopy-prices.sql:ro
      - ./scripts/migrate-bhavcopy-widenpct.sql:/docker-entrypoint-initdb.d/migrate-bhavcopy-widenpct.sql:ro
      - ./scripts/migrate-index-prices.sql:/docker-entrypoint-initdb.d/migrate-index-prices.sql:ro
      - ./scripts/migrate-angle-scrip.sql:/docker-entrypoint-initdb.d/migrate-angle-scrip.sql:ro
      - ./scripts/migrate-angle-scrip-ltp.sql:/docker-entrypoint-initdb.d/migrate-angle-scrip-ltp.sql:ro
      - ./strategy-api/migrations/001_strategies.sql:/docker-entrypoint-initdb.d/migrate-001-strategies.sql:ro
      - ./strategy-api/migrations/002_paper_trading.sql:/docker-entrypoint-initdb.d/migrate-002-paper-trading.sql:ro
      - ./strategy-api/migrations/003_option_greeks_strategies.sql:/docker-entrypoint-initdb.d/migrate-003-option-greeks.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tradekaro} -d abhitrade_live']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - app-net
      - db-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: abhitrade-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --save 60 1
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --loglevel notice
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-net
      - db-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  # ── Security-master CSV loader (one-shot) ─────────────────────────────────
  loader:
    build:
      context: .
      dockerfile: Dockerfile.loader
    container_name: abhitrade-loader
    volumes:
      - .:/csv:ro
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB_LIVE=abhitrade_live
      - POSTGRES_USER=${POSTGRES_USER:-tradekaro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tradekaro}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: 'no'
    profiles:
      - tools
    networks:
      - app-net

  # ── Strategy API (FastAPI / Python) ──────────────────────────────────────
  # Handles /api/strategies/* and /api/backtests/* — routed here by nginx.
  # Port 8000 is NOT exposed to the host; access is through nginx only.
  strategy-api:
    build:
      context: ./strategy-api
      dockerfile: Dockerfile
    container_name: abhitrade-strategy-api
    expose:
      - '8000'
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-tradekaro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tradekaro}
      - POSTGRES_DB=abhitrade_live
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_ALGORITHM=HS256
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://abhitrade.com}
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 5s
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy-net
      - app-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ── Next.js App — internal only, fronted by Nginx ─────────────────────────
  # Port 3000 is NOT exposed to the host. All traffic comes through nginx.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abhitrade-app
    expose:
      - '3000'
    volumes:
      - uploads:/app/tmp/uploads
      - bhavcopy_data:/app/Bhavcopy
      - index_data:/app/index
    environment:
      - NODE_ENV=production
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB_LIVE=abhitrade_live
      - POSTGRES_USER=${POSTGRES_USER:-tradekaro}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tradekaro}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://abhitrade.com/api}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - UPLOAD_DIR=/app/tmp/uploads
      - ANGELONE_API_KEY=${ANGELONE_API_KEY:-}
      - ANGELONE_CLIENT_ID=${ANGELONE_CLIENT_ID:-}
      - ANGELONE_PASSWORD=${ANGELONE_PASSWORD:-}
      - ANGELONE_TOTP_SECRET=${ANGELONE_TOTP_SECRET:-}
      - RELIGARE_API_KEY=${RELIGARE_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 5s
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - proxy-net
      - app-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # ── Nginx — reverse proxy + SSL termination ────────────────────────────────
  # Starts in HTTP-only mode if no SSL cert exists yet.
  # After running ssl-init.sh, restart nginx to activate HTTPS:
  #   docker compose restart nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: abhitrade-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # http.conf mounted as template — entrypoint writes final version to conf.d
      - ./nginx/conf.d/http.conf:/etc/nginx/http.conf.template:ro
      - ./nginx/conf.d/https.conf:/etc/nginx/https.conf.template:ro
      - ./nginx/entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    command: ["/bin/sh", "/docker-entrypoint-custom.sh"]
    depends_on:
      app:
        condition: service_healthy
      strategy-api:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 5s
    healthcheck:
      test: ['CMD-SHELL', 'pgrep nginx > /dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # ── Certbot — auto-renews Let's Encrypt cert every 12 hours ───────────────
  # First-time cert: run  bash scripts/ssl-init.sh
  certbot:
    image: certbot/certbot:latest
    container_name: abhitrade-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renew loop: wakes every 12h, only actually renews when <30 days remain
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'
    restart: 'no'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  bhavcopy_data:
    driver: local
  index_data:
    driver: local

networks:
  # nginx ↔ app only
  proxy-net:
    driver: bridge
    name: abhitrade-proxy-net

  # app ↔ redis, postgres, market-sync
  app-net:
    driver: bridge
    name: abhitrade-app-net

  # postgres ↔ redis (internal, no external access)
  db-net:
    driver: bridge
    name: abhitrade-db-net
    internal: true
